"$schema" = 'https://starship.rs/config-schema.json'
format = '''[│](bold grey1)$all
[└─](bold grey1) '''

add_newline = true
palette = 'nuunamnir'

[palettes.nuunamnir]
alert1 = "#00e7ff"
alert2 = "#dcb4ff"
alert3 = "#00fbff"
grey1 = "#537b9f"
grey2 = "#7d7199"
grey3 = "#348190"

[cmd_duration]
show_milliseconds = true
format = '[$duration](grey1)'

[package]
symbol = " "

[git_branch]
style = "bright-purple"

[git_status]
style = "bright-red"

[python]
symbol = " "
style = "bright-yellow"

[directory]
style = 'bold background'

[status]
format = '[│](bold grey1)[$symbol$status]($style) '

[character]
success_symbol = '[│](bold grey1)[](bold white) '
error_symbol = '[│](bold grey1)[](bold bright-white) '