"$schema" = 'https://starship.rs/config-schema.json'
format = '''[│](bold grey1)$all
[└─](bold grey1) '''

add_newline = true
palette = 'nuunamnir'

[palettes.nuunamnir]
alert1 = "#002331"
alert2 = "#2c1929"
alert3 = "#2d1c0d"
grey1 = "#d3c297"
grey2 = "#bfaf84"
grey3 = "#ac9c72"

[cmd_duration]
show_milliseconds = true
format = '[$duration](grey1)'

[package]
symbol = " "

[git_branch]
style = "purple"

[git_status]
style = "red"

[python]
symbol = " "
style = "bright-yellow"

[directory]
style = 'bold background'

[status]
format = '[│](bold grey1)[$symbol$status]($style) '

[character]
success_symbol = '[│](bold grey1)[](bold white) '
error_symbol = '[│](bold grey1)[](bold bright-white) '